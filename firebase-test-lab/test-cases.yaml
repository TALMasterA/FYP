- displayName: Onboarding - Swipe through all pages and complete
  steps:
    - goal: Wait for the splash screen to finish loading
    - goal: If the onboarding screen appears, swipe left to go to page 2. If already on the Home screen, stay there.
      hint: There are 3 onboarding pages covering Translate, Learn, and Friends features. Small dot indicators at the bottom show the current page.
    - goal: Swipe left again to go to page 3
      hint: The last page has a Get Started button instead of Next
    - goal: Tap the Get Started button to complete onboarding
      finalScreenAssertion: The Home screen is displayed with the bottom navigation bar visible
- displayName: Onboarding - Skip directly to Home
  steps:
    - goal: Wait for the splash screen to finish loading
    - goal: When the onboarding screen appears, tap the Skip button
      hint: The Skip button may be in the top-right corner of the onboarding screen
      finalScreenAssertion: The Home screen is displayed with the bottom navigation bar
- displayName: Onboarding - Navigate backward with right swipe
  steps:
    - goal: Wait for the splash screen to finish loading
    - goal: When the onboarding screen appears, swipe left to go to page 2
    - goal: Swipe left again to go to page 3
    - goal: Swipe right to go back to page 2 and confirm the page indicator updates
      hint: The small dot indicators at the bottom should change as you swipe backward
    - goal: Swipe right again to go back to page 1 and confirm the page indicator updates
      finalScreenAssertion: The first onboarding page is shown and backward navigation worked correctly
    - goal: Tap the Skip button to exit onboarding
- displayName: Onboarding - Complete using Next buttons
  steps:
    - goal: Wait for the splash screen to finish loading
    - goal: When the onboarding screen appears, tap the Next button to go to page 2
      hint: The Next button should only be visible on pages 1 and 2
    - goal: Confirm the Next button is still visible on page 2 and tap it to go to page 3
    - goal: Confirm the button label has changed from Next to Get Started on page 3
      finalScreenAssertion: The button now reads Get Started, not Next
    - goal: Tap the Get Started button to complete onboarding
      finalScreenAssertion: The Home screen is displayed
- displayName: Authentication - Login with valid credentials
  steps:
    - goal: Skip or complete onboarding to reach the Home screen
    - goal: Tap the Login button in the top bar of the Home screen
      hint: The Login button is in the top-right area of the Home screen top bar
    - goal: Enter test@gmail.com into the email field and tester into the password field
    - goal: Tap the Login button to submit
      finalScreenAssertion: The Home screen shows a welcome greeting and the guest warning card has disappeared
- displayName: Authentication - Toggle between Login and Register forms
  steps:
    - goal: Skip onboarding to reach the Home screen without logging in
    - goal: Tap the Login button in the top bar
    - goal: On the login screen, tap the link that says Don't have an account? Register
      hint: The toggle link is at the bottom of the login form
      finalScreenAssertion: The form switches to registration mode and shows an additional confirm password field
    - goal: Tap the link that says Already have an account? Login
      finalScreenAssertion: The form switches back to login mode
- displayName: Authentication - Navigate to Reset Password screen
  steps:
    - goal: Skip onboarding to reach the Home screen without logging in
    - goal: Tap the Login button in the top bar
    - goal: On the login screen, tap the Forgot password? link
      hint: The Forgot password link is below the password field or below the login button
      finalScreenAssertion: The Reset Password screen is displayed with an email input field
    - goal: Navigate back to the login screen
- displayName: Authentication - Logout
  steps:
    - goal: Skip onboarding to reach the Home screen
    - goal: Tap the Login button and enter test@gmail.com as the email and tester as the password, then submit
      finalScreenAssertion: The Home screen shows a welcome greeting for the logged-in user
    - goal: Tap the Logout button in the top bar
      finalScreenAssertion: The Home screen shows the guest warning card and the Login button has reappeared
- displayName: Home - Guest warning card visible and feature cards locked
  steps:
    - goal: Skip onboarding to reach the Home screen without logging in
    - goal: Scroll the Home screen down to see all content
    - goal: Confirm a guest warning card or banner is visible near the top of the content
      hint: The guest warning card typically has a different background colour such as an error or warning tone
      finalScreenAssertion: A guest warning card is clearly visible
    - goal: Confirm the Quick Translate feature card is visible but appears disabled or locked
      hint: Disabled feature cards may be greyed out, have reduced opacity, or show a lock icon
    - goal: Confirm the Live Conversation feature card is visible but appears disabled or locked
    - goal: Confirm the Learning feature card is visible but appears disabled or locked
      hint: Tapping a locked feature card should prompt a login redirect rather than launching the feature
    - goal: Scroll back to the top of the Home screen
- displayName: Home - Change app language using the language dropdown
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: On the Home screen, find the language dropdown or selector in the top area and tap it
      hint: The language dropdown may be in the top-left or top-center of the Home screen
    - goal: Select a different language such as Chinese or Japanese from the dropdown
      finalScreenAssertion: The app UI language changes to the selected language
    - goal: Open the language dropdown again and change the app language back to English
- displayName: Translate - Open Speech Recognition screen and verify layout
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Tap the Translate tab in the bottom navigation bar
      hint: The Translate tab icon in the bottom navigation looks like a microphone
      finalScreenAssertion: The Speech Recognition screen is displayed
    - goal: Verify there are language selector dropdowns for source and target languages
      hint: There should be two language pickers, one for the language you speak and one for the translation target
    - goal: Verify a microphone button or recording control is visible
    - goal: Scroll down to check for any additional content or controls below the initial view
    - goal: Scroll back to the top
- displayName: Translate - Change source and target languages
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Translate tab via the bottom navigation bar
    - goal: Tap the source language dropdown and select a different language
      finalScreenAssertion: The source language selection is updated in the UI
    - goal: Tap the target language dropdown and select a different language
      finalScreenAssertion: Both language selections are reflected in the UI
- displayName: Live Conversation - Open screen and verify Speaker A/B layout
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Tap the Live Conversation card on the Home screen
      hint: The Live Conversation card is on the Home screen. If not visible, scroll down to find it.
      finalScreenAssertion: The Continuous Conversation screen is displayed
    - goal: Verify there are separate language selectors for Speaker A and Speaker B
      hint: Speaker A section is typically on the top half and Speaker B on the bottom half of the screen
    - goal: Verify there are separate microphone controls for each speaker
      finalScreenAssertion: Both Speaker A and Speaker B sections are present with their own language selectors and microphone controls
- displayName: History - View Quick Translate and Live Conversation tabs
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Tap the History button from the Home screen top bar
      hint: The History button is in the top bar of the Home screen
      finalScreenAssertion: The History screen is shown
    - goal: Tap the Quick Translate tab and verify it is active
      hint: The History screen should have two tabs at the top for the two types of translation history
    - goal: Tap the Live Conversation tab and verify it is active
      finalScreenAssertion: The Live Conversation history tab is now active
- displayName: Learning - Open Learning screen and navigate to Word Bank
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and tester
    - goal: Navigate to the Translate tab
    - goal: Tap the microphone and say 'Hello' or 'Good morning' to generate a translation record
      hint: This is needed so learning materials can be generated.
    - goal: Wait for the translation to complete
    - goal: Tap the Learn tab in the bottom navigation bar
    - goal: Find and tap the Word Bank button, link, or card
    - goal: Scroll down through the Word Bank list
- displayName: Learning - View Learning Sheet for a language pair
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and tester
    - goal: Navigate to the Translate tab
    - goal: Tap the microphone and say 'How are you' to generate a translation record
    - goal: Wait for the translation to complete
    - goal: Navigate to the Learn tab
    - goal: Find a Learning Sheet item or section and tap it
      hint: If no sheet exists yet, look for a generate or create button
    - goal: Scroll through the Learning Sheet content
- displayName: Learning - Take a Quiz
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and tester
    - goal: Navigate to the Translate tab
    - goal: Tap the microphone and say a short sentence to generate a translation record
    - goal: Wait for the translation to complete
    - goal: Navigate to the Learn tab
    - goal: Find the Quiz section or button and tap it
      hint: If no quiz exists yet, look for a generate button
    - goal: Answer the quiz question by selecting one option
    - goal: Continue through a few more questions
    - goal: Navigate back when done
- displayName: Friends - Browse list and navigate to My Profile
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Tap the Friends tab in the bottom navigation bar
      hint: The Friends tab icon looks like a person or group of people
      finalScreenAssertion: The Friends list screen is displayed
    - goal: Scroll down through the friends list to see all entries
    - goal: Scroll back to the top
    - goal: Find and tap the My Profile option or button
      hint: My Profile may be accessible via a top bar icon or a button within the Friends screen
      finalScreenAssertion: The My Profile screen is shown with profile details
    - goal: Navigate back to the Friends list
- displayName: Friends - Open Shared Inbox
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Friends tab in the bottom navigation bar
    - goal: Find and tap the Shared Inbox option
      hint: Shared Inbox may show materials shared between friends
      finalScreenAssertion: The Shared Inbox screen is displayed
    - goal: Navigate back to the Friends screen
- displayName: Friends - Open Blocked Users screen
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Friends tab in the bottom navigation bar
    - goal: Find and tap the Blocked Users option
      hint: Blocked Users may be accessible via a top bar overflow menu or settings icon on the Friends screen
      finalScreenAssertion: The Blocked Users screen is displayed
    - goal: Navigate back
- displayName: Settings - Scroll through all settings options
  steps:
    - goal: Skip onboarding without logging in
    - goal: Tap the Settings tab in the bottom navigation bar
      hint: Settings is the last tab in the bottom navigation bar and is accessible without logging in
      finalScreenAssertion: The Settings screen is displayed
    - goal: Scroll down to see all settings options including appearance, languages, account, and other preferences
    - goal: Scroll back to the top
- displayName: Settings - Change theme mode between light and dark
  steps:
    - goal: Navigate to the Settings tab in the bottom navigation bar
    - goal: Find the theme mode toggle such as a Dark Mode or Night Mode switch and tap it to switch the theme
      hint: The theme toggle may be labeled Dark Mode, Night Mode, or Theme
      finalScreenAssertion: The app appearance changes to darker or lighter background
    - goal: Tap the toggle again to restore the original theme
- displayName: Settings - Adjust font size using the slider
  steps:
    - goal: Navigate to the Settings tab in the bottom navigation bar
    - goal: Find the font size slider in the settings
      hint: The font size slider may be in an Accessibility or Appearance section, scroll down if not immediately visible
    - goal: Drag the font size slider to the right to increase the font size
      finalScreenAssertion: Text in the app becomes visibly larger
    - goal: Drag the slider back to the center or original position
- displayName: Settings - Select a color palette
  steps:
    - goal: Navigate to the Settings tab in the bottom navigation bar
    - goal: Find and tap the Shop option
      hint: The color palette is inside the Shop screen.
    - goal: Find the color palette selector, which may appear as a row of colored circles
    - goal: Tap a different color option from the palette
      finalScreenAssertion: The app accent colors change to reflect the new selection
- displayName: Shop - Browse the coin shop and view items
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Settings tab
    - goal: Find and tap the Shop option
      hint: The Shop may be accessible from within the Settings screen. Items in the shop are purchased using in-app coins.
      finalScreenAssertion: The Shop screen is displayed with available items and their coin prices
    - goal: Scroll through the shop items to see all available options
    - goal: Navigate back to Settings
- displayName: Voice Settings - Open and verify options
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Settings tab
    - goal: Find and tap Voice Settings
      finalScreenAssertion: The Voice Settings screen shows options for voice speed, pitch, or language voice selection
    - goal: Scroll down to see if there are additional voice options below the fold
      hint: Voice Settings controls text-to-speech settings for translations
    - goal: Navigate back to Settings
- displayName: Profile - Open Profile screen and view details
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Settings tab
    - goal: Find and tap Profile
      hint: Profile may show the user's display name, email, coin balance, and other account info
      finalScreenAssertion: The Profile screen shows the user's name, email, and profile statistics
    - goal: Navigate back
- displayName: Favorites - Open Favorites screen and verify layout
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Settings tab
    - goal: Find and tap Favorites
      hint: Favorites may show saved translations or vocabulary items
      finalScreenAssertion: The Favorites screen is displayed
    - goal: Navigate back
- displayName: Feedback - Submit feedback
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and tester
      hint: Feedback is for logged in users.
    - goal: Navigate to the Settings tab
    - goal: Scroll through settings to find the Feedback option and tap it
      hint: Feedback is one of the few settings screens accessible without authentication
      finalScreenAssertion: The Feedback screen opens successfully without requiring login
    - goal: Navigate back
- displayName: Notification Settings - Toggle notification options
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Navigate to the Settings tab
    - goal: Find and tap Notification Settings
      finalScreenAssertion: The Notification Settings screen is displayed with toggle switches
    - goal: Toggle one of the notification options off
    - goal: Toggle the same option back on
    - goal: Navigate back
- displayName: Bottom Navigation - Cycle through all five tabs
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
    - goal: Tap the Home tab in the bottom navigation bar and confirm the Home screen is visible
      hint: The bottom navigation bar has 5 icons at the bottom of every screen
    - goal: Tap the Translate tab and confirm the Speech Recognition screen appears
    - goal: Tap the Learn tab and confirm the Learning screen appears
    - goal: Tap the Friends tab and confirm the Friends list appears
    - goal: Tap the Settings tab and confirm the Settings screen appears
    - goal: Tap the Home tab to return to the Home screen
      finalScreenAssertion: All five tabs were navigated successfully and each showed the correct screen
- displayName: Help - Open and scroll all content
  steps:
    - goal: Skip onboarding to reach the Home screen without logging in
    - goal: Find the Help or Info icon in the top bar of the Home screen and tap it
      hint: The Help icon may look like a question mark or info symbol in the top bar. Help is accessible without logging in.
      finalScreenAssertion: The Help screen is displayed with instructional content
    - goal: Scroll down to see all help sections
    - goal: Navigate back to the Home screen
- displayName: End-to-End - Full authenticated user journey
  steps:
    - goal: Skip onboarding and log in using test@gmail.com and password tester
      finalScreenAssertion: The Home screen shows a welcome greeting for the logged-in user
    - goal: Navigate to the Translate tab and confirm the Speech Recognition screen appears
    - goal: Navigate to the Learn tab and confirm the Learning screen appears
    - goal: Navigate to the Friends tab and confirm the Friends list appears
    - goal: Navigate to the Settings tab and scroll through the settings
    - goal: Return to the Home screen via the bottom navigation
    - goal: Tap the History button in the top bar and confirm the History screen opens
      hint: The History button is in the top bar of the Home screen
    - goal: Navigate back to the Home screen
      finalScreenAssertion: The full app journey completed successfully with all major sections visited
