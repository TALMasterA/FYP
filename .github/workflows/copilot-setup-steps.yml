name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Authenticate Firebase for the MCP Server and Copilot Agent
      - name: Authenticate Firebase
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |

          echo "$GOOGLE_CREDENTIALS_JSON" > firebase-sa.json

          mkdir -p fyp-backend
          echo "$GOOGLE_CREDENTIALS_JSON" > fyp-backend/firebase-sa.json

          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-sa.json" >> $GITHUB_ENV

          ls -la firebase-sa.json
