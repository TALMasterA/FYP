name: CI

on:
  push:
    branches: [main, postFYP]
  pull_request:
    branches: [main, postFYP]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.versions.toml') }}
          restore-keys: gradle-v2-

      - name: Create google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is missing or empty"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Android coverage report (Kover, non-blocking)
        # Initial 35% line-coverage floor as per docs/APP_SUGGESTIONS.md item 8.
        # Kept non-blocking until the floor is raised in a follow-up task.
        continue-on-error: true
        run: ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug :app:koverVerifyDebug

      - name: Upload Android coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage
          path: |
            app/build/reports/kover/reportDebug.xml
            app/build/reports/kover/htmlDebug
          if-no-files-found: warn

  code-quality:
    name: Code Quality (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.versions.toml') }}
          restore-keys: gradle-v2-

      - name: Create google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is missing or empty"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt (item 45 from docs/APP_SUGGESTIONS.md)
        # Detekt + ktlint formatting ruleset. Existing issues are silenced via
        # app/detekt-baseline.xml (generated locally with `:app:detektBaseline`).
        # Kept non-blocking until the baseline is committed; flip to
        # `continue-on-error: false` once `app/detekt-baseline.xml` exists in
        # the repo, so any NEW violations break the build.
        continue-on-error: false
        run: ./gradlew :app:detekt

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            app/build/reports/detekt
          if-no-files-found: warn

  build-debug-apk:
    name: Build Debug APK
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/*.versions.toml') }}
          restore-keys: gradle-v2-

      - name: Create google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is missing or empty"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Macrobenchmark module assemble (non-blocking)
        # Item 14 from docs/APP_SUGGESTIONS.md. Macrobenchmark tests need a real
        # device/emulator (no KVM on ubuntu-latest), so CI only verifies the
        # module compiles. Run benchmarks locally with:
        #   ./gradlew :macrobenchmark:connectedBenchmarkAndroidTest
        continue-on-error: true
        run: ./gradlew :macrobenchmark:assemble

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  backend:
    name: Backend Lint, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fyp-backend/functions
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: fyp-backend/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test With Coverage
        run: npm run test:coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: fyp-backend/functions/coverage
          if-no-files-found: error

  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  gradle-dependency-submission:
    name: Gradle Dependency Submission (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Create google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is missing or empty"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
      - name: Submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@v3
